name: Deploy private Pages artifact
# The site is read from private archive/df-public-deploy; no policy data is stored here.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout private deployment source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_SOURCE_REPOSITORY }}
          ref: archive/df-public-deploy
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: source

      - name: Prepare Pages artifact
        run: |
          mkdir dist
          rsync -a --exclude='.git' source/ dist/

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Apply GitHub Pages base path
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          base_path = os.environ.get("BASE_PATH", "").rstrip("/")
          if not base_path:
              raise SystemExit(0)

          root_path = re.compile(r'(?P<prefix>["\'`=(])/(?P<root>deepfake-policy|api-static)/')
          changed = 0
          for path in Path("dist").rglob("*"):
              if not path.is_file() or path.suffix.lower() not in {".html", ".js", ".css"}:
                  continue
              source = path.read_text(encoding="utf-8")
              rewritten = root_path.sub(
                  lambda match: (
                      f'{match.group("prefix")}{base_path}/{match.group("root")}/'
                  ),
                  source,
              )
              if rewritten != source:
                  path.write_text(rewritten, encoding="utf-8")
                  changed += 1

          print(f"Applied Pages base path {base_path} to {changed} files.")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
